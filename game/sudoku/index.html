
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku | Game Lab</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --line: #dbe3ef;
        --text: #111827;
        --muted: #6b7280;
        --accent: #2563eb;
        --ok: #15803d;
        --bad: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #f8fbff, #f5f7fb);
        color: var(--text);
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      .wrap {
        width: min(980px, 94vw);
        margin: 0 auto;
        padding: 26px 0 48px;
      }

      .topbar {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 12px 16px;
      }

      .brand {
        text-decoration: none;
        color: var(--text);
        font-size: 20px;
        font-weight: 700;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .nav a {
        text-decoration: none;
        color: var(--muted);
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 14px;
      }

      .nav a:hover,
      .nav a.active {
        color: var(--text);
        background: #edf4ff;
        border-color: var(--line);
      }

      .panel {
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        padding: 18px;
      }

      .panel h1 {
        margin: 0;
        font-size: 30px;
      }

      .sub {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .controls {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      select,
      button {
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 14px;
        padding: 8px 12px;
        background: var(--surface);
        color: var(--text);
      }

      button {
        cursor: pointer;
      }

      button.primary {
        background: var(--text);
        color: #fff;
        border-color: var(--text);
      }

      .status {
        margin-top: 10px;
        min-height: 20px;
        font-size: 14px;
      }

      .status.ok {
        color: var(--ok);
      }

      .status.bad {
        color: var(--bad);
      }

      .board {
        margin-top: 14px;
        width: fit-content;
        border: 2px solid #1f2937;
        display: grid;
        grid-template-columns: repeat(9, 42px);
      }

      .cell {
        width: 42px;
        height: 42px;
        border: 1px solid #cbd5e1;
        text-align: center;
        font-size: 18px;
        color: #111827;
        outline: none;
      }

      .cell.fixed {
        background: #f3f4f6;
        font-weight: 700;
      }

      .cell.err {
        background: #fee2e2;
      }

      .cell:focus {
        background: #edf4ff;
      }

      .thick-right {
        border-right: 2px solid #1f2937;
      }

      .thick-bottom {
        border-bottom: 2px solid #1f2937;
      }

      .hint {
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      @media (max-width: 640px) {
        .board {
          grid-template-columns: repeat(9, 34px);
        }

        .cell {
          width: 34px;
          height: 34px;
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="topbar">
        <a class="brand" href="/">Dezhonger</a>
        <nav class="nav" aria-label="Game navigation">
          <a href="/game/">Game Hub</a>
          <a href="/game/sudoku/" class="active">Sudoku</a>
          <a href="/game/24/">24 Game</a>
          <a href="/game/2048/">2048</a>
          <a href="/game/minesweeper/">Minesweeper</a>
          <a href="/game/snake/">Snake</a>
          <a href="/game/hanoi/">Hanoi</a>
          <a href="/game/tetris/">Tetris</a>
          <a href="/blog/">Blog</a>
        </nav>
      </header>

      <section class="panel">
        <h1>数独 Sudoku</h1>
        <p class="sub">题目由浏览器实时生成，并不是写死的固定题库。你可以随时生成新题并切换难度。</p>

        <div class="controls">
          <label>
            难度
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>
          <button id="new-game">新题</button>
          <button id="check" class="primary">检查</button>
          <button id="reset">重置</button>
          <button id="answer">显示答案</button>
        </div>

        <div id="status" class="status"></div>
        <div id="board" class="board" aria-label="Sudoku board"></div>

        <div class="hint">
          规则：每行、每列、每个 3x3 宫格都必须包含 1-9 且不重复。
        </div>
      </section>
    </main>

    <script>
      (() => {
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const difficultyEl = document.getElementById('difficulty');

        const removalByDifficulty = {
          easy: 40,
          medium: 48,
          hard: 54
        };

        let currentPuzzle = null;
        let currentSolution = null;

        function setStatus(msg, type) {
          statusEl.textContent = msg;
          statusEl.className = 'status ' + (type || '');
        }

        function cloneGrid(grid) {
          return grid.map(row => row.slice());
        }

        function shuffle(arr) {
          const a = arr.slice();
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const t = a[i];
            a[i] = a[j];
            a[j] = t;
          }
          return a;
        }

        function makeEmptyGrid() {
          return Array.from({ length: 9 }, () => Array(9).fill(0));
        }

        function getCandidates(grid, r, c) {
          if (grid[r][c] !== 0) return [];
          const used = new Set();

          for (let i = 0; i < 9; i++) {
            used.add(grid[r][i]);
            used.add(grid[i][c]);
          }

          const br = Math.floor(r / 3) * 3;
          const bc = Math.floor(c / 3) * 3;
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              used.add(grid[br + i][bc + j]);
            }
          }

          const cands = [];
          for (let n = 1; n <= 9; n++) {
            if (!used.has(n)) cands.push(n);
          }
          return cands;
        }

        function findBestEmpty(grid) {
          let best = null;
          let bestCands = null;

          for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
              if (grid[r][c] !== 0) continue;
              const cands = getCandidates(grid, r, c);
              if (cands.length === 0) return { r: r, c: c, cands: [] };
              if (!best || cands.length < bestCands.length) {
                best = { r: r, c: c };
                bestCands = cands;
                if (cands.length === 1) {
                  return { r: best.r, c: best.c, cands: bestCands };
                }
              }
            }
          }

          if (!best) return null;
          return { r: best.r, c: best.c, cands: bestCands };
        }

        function solveRandom(grid) {
          const cell = findBestEmpty(grid);
          if (!cell) return true;
          if (cell.cands.length === 0) return false;

          const nums = shuffle(cell.cands);
          for (const n of nums) {
            grid[cell.r][cell.c] = n;
            if (solveRandom(grid)) return true;
            grid[cell.r][cell.c] = 0;
          }

          return false;
        }

        function countSolutions(grid, limit) {
          let count = 0;

          function dfs() {
            if (count >= limit) return;
            const cell = findBestEmpty(grid);
            if (!cell) {
              count++;
              return;
            }
            if (cell.cands.length === 0) return;

            for (const n of cell.cands) {
              grid[cell.r][cell.c] = n;
              dfs();
              grid[cell.r][cell.c] = 0;
              if (count >= limit) return;
            }
          }

          dfs();
          return count;
        }

        function generateSolvedGrid() {
          const grid = makeEmptyGrid();
          solveRandom(grid);
          return grid;
        }

        function generatePuzzle(removals) {
          const solution = generateSolvedGrid();
          const puzzle = cloneGrid(solution);

          const positions = shuffle(Array.from({ length: 81 }, (_, i) => i));
          let removed = 0;

          for (const pos of positions) {
            if (removed >= removals) break;
            const r = Math.floor(pos / 9);
            const c = pos % 9;
            const backup = puzzle[r][c];
            puzzle[r][c] = 0;

            const test = cloneGrid(puzzle);
            const cnt = countSolutions(test, 2);
            if (cnt !== 1) {
              puzzle[r][c] = backup;
            } else {
              removed++;
            }
          }

          return {
            puzzle: puzzle,
            solution: solution,
            removed: removed
          };
        }

        function createBoard() {
          boardEl.innerHTML = '';
          for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
              const input = document.createElement('input');
              input.className = 'cell';
              if (c === 2 || c === 5) input.classList.add('thick-right');
              if (r === 2 || r === 5) input.classList.add('thick-bottom');
              input.maxLength = 1;
              input.inputMode = 'numeric';
              input.dataset.r = String(r);
              input.dataset.c = String(c);
              input.addEventListener('input', () => {
                input.value = input.value.replace(/[^1-9]/g, '');
                input.classList.remove('err');
              });
              boardEl.appendChild(input);
            }
          }
        }

        function renderPuzzle(grid) {
          const cells = Array.from(boardEl.querySelectorAll('.cell'));
          cells.forEach((cell, idx) => {
            const r = Math.floor(idx / 9);
            const c = idx % 9;
            const v = grid[r][c];
            cell.classList.remove('err', 'fixed');
            if (v !== 0) {
              cell.value = String(v);
              cell.readOnly = true;
              cell.classList.add('fixed');
            } else {
              cell.value = '';
              cell.readOnly = false;
            }
          });
        }

        function readGrid() {
          const cells = Array.from(boardEl.querySelectorAll('.cell'));
          const grid = makeEmptyGrid();
          cells.forEach((cell, idx) => {
            const r = Math.floor(idx / 9);
            const c = idx % 9;
            grid[r][c] = cell.value ? Number(cell.value) : 0;
          });
          return grid;
        }

        function markConflicts(grid) {
          const cells = Array.from(boardEl.querySelectorAll('.cell'));
          cells.forEach(cell => cell.classList.remove('err'));
          let ok = true;

          function markGroup(indices) {
            const seen = new Map();
            for (const idx of indices) {
              const r = Math.floor(idx / 9);
              const c = idx % 9;
              const v = grid[r][c];
              if (v === 0) continue;
              if (!seen.has(v)) seen.set(v, [idx]);
              else seen.get(v).push(idx);
            }
            seen.forEach(arr => {
              if (arr.length > 1) {
                ok = false;
                arr.forEach(i => cells[i].classList.add('err'));
              }
            });
          }

          for (let r = 0; r < 9; r++) {
            markGroup(Array.from({ length: 9 }, (_, c) => r * 9 + c));
          }
          for (let c = 0; c < 9; c++) {
            markGroup(Array.from({ length: 9 }, (_, r) => r * 9 + c));
          }
          for (let br = 0; br < 3; br++) {
            for (let bc = 0; bc < 3; bc++) {
              const block = [];
              for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                  block.push((br * 3 + r) * 9 + (bc * 3 + c));
                }
              }
              markGroup(block);
            }
          }

          return ok;
        }

        function checkSudoku() {
          const grid = readGrid();
          const incomplete = grid.some(row => row.some(v => v === 0));
          if (incomplete) {
            setStatus('还有空格未填写。', 'bad');
            return;
          }

          const noConflict = markConflicts(grid);
          if (!noConflict) {
            setStatus('存在冲突，请检查红色格子。', 'bad');
            return;
          }

          let sameAsAnswer = true;
          for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
              if (grid[r][c] !== currentSolution[r][c]) {
                sameAsAnswer = false;
              }
            }
          }
          if (sameAsAnswer) {
            setStatus('恭喜，答案正确。', 'ok');
          } else {
            setStatus('规则上无冲突，但和当前题解不一致。', 'bad');
          }
        }

      function resetSudoku() {
        if (!currentPuzzle) return;
        renderPuzzle(currentPuzzle);
        setStatus('已重置到题目初始状态。', '');
      }

      function showAnswer() {
        if (!currentSolution) return;
        renderPuzzle(currentSolution);
        setStatus('已显示答案。', '');
      }

      function newGame() {
        setStatus('正在生成题目，请稍候...', '');
        const removals = removalByDifficulty[difficultyEl.value] || 48;
        setTimeout(() => {
          const data = generatePuzzle(removals);
          currentPuzzle = data.puzzle;
          currentSolution = data.solution;
          renderPuzzle(currentPuzzle);
          setStatus('新题已生成，实际挖空 ' + data.removed + ' 格。', '');
        }, 10);
      }

      createBoard();
      newGame();

      document.getElementById('new-game').addEventListener('click', newGame);
      document.getElementById('check').addEventListener('click', checkSudoku);
      document.getElementById('reset').addEventListener('click', resetSudoku);
      document.getElementById('answer').addEventListener('click', showAnswer);
    })();
    </script>
  </body>
</html>
